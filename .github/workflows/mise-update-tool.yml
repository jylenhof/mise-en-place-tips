---
name: mise tool updates

on:
  schedule:
    - cron: '30 5 * * 1'
  workflow_dispatch:
    inputs:
      tools:
        description: Comma separated tools to upgrade. Leave empty to upgrade all local tools.
        required: false
        default: ''
      keep:
        description: Comma separated tools to exclude from the upgrade.
        required: false
        default: ''

permissions:
  contents: read

jobs:
  upgrade:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Generate GitHub token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: generate-token
        with:
          client-id: ${{ secrets.CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0

      - name: Upgrade local mise tools
        uses: jylenhof/mise-update-tool@4e0cfce6308fd87c30fc0b6da75032d034292bac # v1.0.1
        with:
          token: ${{ steps.generate-token.outputs.token }}
          tools: ${{ inputs.tools }}
          keep: ${{ inputs.keep }}
          pull-request-strategy: per-tool
