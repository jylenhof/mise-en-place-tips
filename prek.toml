[[repos]]
repo = "local"
hooks = [
  {
    id = "actionlint",
    name = "actionlint",
    entry = "actionlint",
    language = "system",
    files = '\.github/workflows/.*\.(yaml|yml)$'
  },
  {
    id = "editorconfig-checker",
    name = "editorconfig-checker",
    entry = "ec",
    language = "system"
  },
  {
    id = "pinact",
    name = "pinact",
    entry = "pinact run",
    language = "system",
    files = '\.github/workflows/.*\.(yaml|yml)$'
  },
  {
    id = "rumdl",
    name = "rumdl",
    entry = "rumdl check",
    language = "system",
    files = '\.md$'
  },
  {
    id = "tombi-format",
    name = "tombi format",
    entry = "tombi format",
    language = "system",
    files = '\.toml$'
  },
  {
    id = "tombi-lint",
    name = "tombi lint",
    entry = "tombi lint",
    language = "system",
    files = '\.toml$'
  },
  {
    id = "zizmor",
    name = "zizmor",
    entry = "zizmor",
    language = "system",
    files = '(\.github/(workflows/.*|dependabot.ya?ml))|(action\.ya?ml)$'
  },
]
